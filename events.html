<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары - События</title>
    <style>
        body { background-color: #1a242f; color: #e0e6ed; font-family: monospace; margin: 0; padding: 8px; }
        .header { background-color: #2c3e50; border: 1px solid #34495e; padding: 6px; text-align: center; margin-bottom: 8px; font-weight: bold; color: #00d2ff; }
        .w-block { background-color: #243342; border: 1px solid #2c3e50; padding: 8px; margin-bottom: 6px; font-size: 0.9em; position: relative; }
        
        /* Цвета категорий для ленты логов */
        .cat-arena { color: #ff6b6b; font-weight: bold; }
        .cat-mine { color: #2ecc71; font-weight: bold; }
        .cat-gift { color: #3498db; font-weight: bold; }
        .cat-boss { color: #e67e22; font-weight: bold; }
        
        .time-stamp { float: right; color: #7f8c8d; font-size: 0.85em; }
        .highlight { color: #f1c40f; font-weight: bold; }
        .btn-details { display: block; width: 100px; text-align: center; background-color: #2c3e50; border: 1px solid #34495e; color: #fff; padding: 2px; margin-top: 6px; font-size: 0.8em; text-decoration: none; cursor: pointer; }
        .btn-details:hover { background-color: #34495e; }
        
        .clear-btn { background-color: #c0392b; color: white; border: none; padding: 4px 8px; width: 100%; font-family: monospace; margin-bottom: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Универсальные контейнеры шапки для автоматического рендера из global_core.js -->
    <div id="header-container"></div>
    <div id="core-header"></div>

    <div class="header">⚔️ СОБЫТИЯ ЗА 3 ДНЯ</div>

    <button class="clear-btn" onclick="clearEvents()">Очистить журнал</button>

    <!-- Сюда выводятся логи -->
    <div id="events-container"></div>

    <!-- Автоматическое нижнее WAP-меню из ядра займет это место -->
    <div id="core-footer"></div>

    <script src="global_core.js"></script>
    <script>
        function loadEvents() {
            const container = document.getElementById('events-container');
            const events = JSON.parse(localStorage.getItem('game_events')) || [];

            if (events.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#7f8c8d;">Нет новых событий.</div>';
                return;
            }

            let html = '';
            // Выводим новые события сверху
            events.slice().reverse().forEach(ev => {
                let catClass = 'cat-mine';
                if (ev.type === 'arena') catClass = 'cat-arena';
                if (ev.type === 'gift') catClass = 'cat-gift';
                if (ev.type === 'boss') catClass = 'cat-boss';

                html += `
                <div class="w-block">
                    <span class="time-stamp">${ev.time}</span>
                    <span class="${catClass}">${ev.category}</span><br>
                    <div style="margin-top: 4px;">${ev.text}</div>
                    ${ev.hasDetails ? `<a class="btn-details" onclick="alert('Детали боя в разработке')">ДЕТАЛИ БОЯ</a>` : ''}
                </div>`;
            });

            container.innerHTML = html;
        }

        window.clearEvents = function() {
            if(confirm("Очистить все события?")) {
                localStorage.setItem('game_events', JSON.stringify([]));
                loadEvents();
            }
        }

        document.addEventListener("DOMContentLoaded", loadEvents);
    </script>
</body>
</html>
