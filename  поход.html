<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поход</title>
    <style>
        body { 
            background: #000b14; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            font-size: 14px;
        }
        
        /* Синяя плашка уведомлений сверху как на скрине */
        .system-notification {
            display: none;
            background: linear-gradient(180deg, #10253d 0%, #071324 100%);
            border-bottom: 1px solid #1f4268;
            color: #79b2f2;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            line-height: 1.4;
        }
        .system-notification a {
            color: #3b9eff;
            text-decoration: underline;
        }

        .header {
            background: linear-gradient(180deg, #0d1a26 0%, #050d14 100%);
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #1a334d;
            letter-spacing: 1px;
        }

        .content {
            padding: 10px;
            text-align: center;
        }

        .promo-img {
            width: 100%;
            max-width: 320px;
            border: 2px solid #1a334d;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .info-block {
            text-align: left;
            max-width: 320px;
            margin: 0 auto 15px auto;
            line-height: 1.5;
            color: #cbd5e1;
        }
        .info-block strong {
            color: #fff;
        }

        .time-select {
            background: #111e29;
            color: #fff;
            border: 1px solid #26405a;
            padding: 8px;
            width: 100%;
            max-width: 220px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-submit {
            background: linear-gradient(180deg, #c2410c 0%, #7c2d12 100%);
            border: 2px solid #ff4500;
            box-shadow: inset 0 0 10px #ff0000, 0 0 5px #ff4500;
            color: #fff;
            font-weight: bold;
            padding: 10px 40px;
            font-size: 14px;
            border-radius: 3px;
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
        }

        .menu-list {
            margin-top: 25px;
            border-top: 1px solid #1a334d;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #07131f 0%, #030a12 100%);
            padding: 10px 12px;
            border-bottom: 1px solid #102233;
            text-decoration: none;
            color: #3b9eff;
            font-weight: bold;
        }
        .menu-item .icon-text { display: flex; align-items: center; gap: 8px; }
        .menu-item .arrow { color: #00ffcc; font-family: monospace; }
    </style>
</head>
<body>

    <!-- Синее системное уведомление -->
    <div id="top-notification" class="system-notification"></div>

    <div class="header">Поход</div>

    <div class="content">
        <img src="https://freepik.com" alt="Поход" class="promo-img">

        <div class="info-block">
            <strong>Последний поход:</strong><br>
            <span id="last-exp-info">Вы еще не ходили в поход.</span><br>
            Осталось времени на поход: <span id="ui-time-left">360</span> минут<br>
            <!-- Блок для живого таймера похода -->
            <span id="ui-current-status" style="color: #ff9900; font-weight: bold;"></span>
        </div>

        <select id="expedition-time" class="time-select">
            <option value="10">10 минут</option>
            <option value="30">30 минут</option>
            <option value="60">60 минут (1 час)</option>
            <option value="180">180 минут (3 часа)</option>
            <option value="360">360 минут (6 часов)</option>
        </select>
        <br>
        <button class="btn-submit" onclick="sendToExpedition()">Отправить</button>
    </div>

    <div class="menu-list">
        <a href="#" class="menu-item" onclick="location.reload(); return false;">
            <div class="icon-text">🔄 Обновить</div>
            <div class="arrow">&gt;&gt;</div>
        </a>
        <a href="index.html" class="menu-item">
            <div class="icon-text">🏠 Главная</div>
            <div class="arrow">&gt;&gt;</div>
        </a>
    </div>

    <script>
        let defData = { gold: 184491, hp: 172365, level: 15, energy: 3, fame: 83258, nextRegenTime: 0, stats: { strength: 5, defense: 5, agility: 5, mastery: 5, vitality: 5 } };
        let heroData = JSON.parse(localStorage.getItem('barb_save')) || defData;
        
        function save() { 
            localStorage.setItem('barb_save', JSON.stringify(heroData)); 
        }

        // Локальная переменная, чтобы плашка "Ты отправился в поход..." показалась сразу после клика
        let justStartedText = localStorage.getItem('exp_just_started') || "";

        function sendToExpedition() {
            let select = document.getElementById('expedition-time');
            let minutes = parseInt(select.value);
            if (window.startExpedition) {
                let success = window.startExpedition(minutes);
                if (success) {
                    localStorage.setItem('exp_just_started', `Ты отправился в поход на ${minutes} минут`);
                    location.reload(); // Перезагружаем, чтобы применить статус
                }
            }
        }

        function updateLocalUI() {
            let now = Math.floor(Date.now() / 1000);
            let used = heroData.expeditionTimeUsed || 0;
            document.getElementById('ui-time-left').innerText = (360 - used);
            
            // 1. Отрисовка истории последнего похода
            if (heroData.lastExpeditionReward) {
                document.getElementById('last-exp-info').innerHTML = 
                    `Ты был в походе ${heroData.lastExpeditionReward.mins} минут , награда: 🪙${heroData.lastExpeditionReward.silver} , 🌟${heroData.lastExpeditionReward.gold}`;
            }

            let notifBox = document.getElementById('top-notification');
            let statusBox = document.getElementById('ui-current-status');

            // 2. Логика живого таймера обратного отсчета
            if (heroData.activeExpedition && heroData.activeExpedition.endTime > now) {
                let timeLeftSeconds = heroData.activeExpedition.endTime - now;
                
                // Переводим секунды в формат ЧЧ:ММ:СС
                let hrs = Math.floor(timeLeftSeconds / 3600);
                let mins = Math.floor((timeLeftSeconds % 3600) / 60);
                let secs = timeLeftSeconds % 60;
                
                let timeString = (hrs < 10 ? "0" : "") + hrs + ":" + 
                                 (mins < 10 ? "0" : "") + mins + ":" + 
                                 (secs < 10 ? "0" : "") + secs;

                // Выводим статус под картинкой
                statusBox.innerHTML = `Ты сейчас в походе. Осталось: ${timeString}`;

                // Выводим синюю плашку сверху страницы
                let startText = justStartedText ? `${justStartedText}<br>` : "";
                notifBox.innerHTML = `${startText}Ты сейчас в походе. Осталось: ${timeString} <a href="#">Посмотреть</a>`;
                notifBox.style.display = "block";
            } else {
                // Если не в походе — прячем таймеры и стираем временный текст старта
                statusBox.innerHTML = "";
                if (justStartedText) {
                    localStorage.removeItem('exp_just_started');
                    justStartedText = "";
                }
                notifBox.style.display = "none";
            }
        }

        setInterval(function() {
            if (window.checkDailyLimitReset) window.checkDailyLimitReset(); 
            if (window.checkExpeditionEnd) window.checkExpeditionEnd(); 
            updateLocalUI();
        }, 1000);

        updateLocalUI();
    </script>
    <script src="поход.js"></script>
</body>
</html>
