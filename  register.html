<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары Онлайн - Регистрация</title>
    <!-- Подключаем общий файл стилей, который лежит в папке css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Контейнер задает красивый синий градиент на весь экран -->
    <div class="container">
        
        <!-- Синяя карточка формы по центру -->
        <div class="auth-box">
            <h2>Регистрация воина</h2>
            
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="Имя варвара" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button type="submit" class="btn-submit">Создать аккаунт</button>
            </form>
            
            <a href="login.html" class="link-text">Уже есть аккаунт? Войти</a>
        </div>

    </div>

    <!-- Подключаем логику, которая лежит в папке js -->
    <script src="js/auth.js"></script>
</body>
</html>
