<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Варвары — Итог боя</title>
    <style>
        body { background-color: #061118; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; user-select: none; }
        .game-banner { background: linear-gradient(to bottom, #112d3e, #091a26); border-bottom: 2px solid #1c8cd1; padding: 8px; text-align: center; font-size: 16px; font-weight: bold; color: #ffffff; text-shadow: 1px 1px 3px #000; }
        .game-header { background: linear-gradient(to bottom, #091a26, #051017); border-bottom: 2px solid #142a3a; padding: 8px 5px; font-size: 12px; color: #b0cbdc; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .header-row { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; line-height: 1.4; }
        .header-item { display: flex; align-items: center; gap: 2px; }
        .nickname { font-weight: bold; color: #e2f2ff; cursor: pointer; }
        .lvl { color: #ff9900; font-weight: bold; cursor: pointer; }
        .hp { color: #ff4d4d; }
        .armor { color: #a0b0b8; }
        .silver { color: #e5e5e5; }
        .gold { color: #ffcc00; font-weight: bold; }
        .gems { color: #00ccff; }

        .category-bar { background: linear-gradient(to bottom, #123524, #05140d); color: #00ffaa; font-size: 14px; font-weight: bold; text-align: center; padding: 6px 15px; border-top: 1px solid #1d5339; border-bottom: 1px solid #040f0a; box-shadow: inset 0 1px 2px rgba(255,255,255,0.1); text-transform: uppercase; }
        
        .result-container { background-color: #050d12; padding: 15px; border-bottom: 1px solid #0f2231; font-size: 14px; line-height: 1.5; color: #adc8d9; }
        .win-text { color: #00ffaa; font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .lose-text { color: #ff4d4d; font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .section-sub { color: #ffffff; margin-top: 10px; font-weight: bold; }
        
        .combat-logs { font-size: 11px; background: #03080b; padding: 8px; border-radius: 4px; border: 1px solid #0f2231; margin-top: 10px; max-height: 150px; overflow-y: auto; line-height: 1.4; color: #799bb3; }

        .menu-container { margin-top: 2px; }
        .menu-link { background: linear-gradient(to bottom, #091b29, #050e16); padding: 13px 15px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f2231; text-decoration: none; color: #adc8d9; font-size: 14px; font-weight: bold; }
        .menu-arrow { color: #1c8cd1; font-weight: bold; letter-spacing: -2px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="game-banner">🛡️ Варвары ⚔️</div>

    <div class="game-header">
        <div class="header-row">
            <div class="header-item">✉️</div>
            <div class="header-item nickname" onclick="window.location.href='profile.html'">🪓 <span id="header-player-name">Загрузка...</span></div>
            <div class="header-item lvl" onclick="window.location.href='hero.html'"><span id="header-lvl">👑 1</span></div>
            <div class="header-item hp">❤️ <span id="header-hp">250</span></div>
            <div class="header-item armor">🛡️ <span id="header-def">5</span></div>
            <div class="header-item silver"><span id="header-silver">🪙 10000</span></div>
            <div class="header-item gems">💎 <span id="header-gems">0</span></div>
            <div class="header-item gold"><span id="header-gold">💰 15</span></div>
            <div class="header-item" onclick="window.location.href='duel.html'" style="cursor: pointer; text-decoration: underline;">⚔️ <span id="header-battles">3/3</span></div>
            <div class="header-item">⏳ 00:00:00</div>
            <div class="header-item">🕒 15:27:52</div>
        </div>
    </div>

    <div class="category-bar">Итог боя</div>

    <div class="result-container">
        <div id="battle-outcome">Расчет поединка...</div>
        <div id="battle-reason"></div>
        
        <div class="section-sub">Награда:</div>
        <div id="battle-rewards"></div>
        
        <div class="section-sub">Нанесенный урон:</div>
        <div><span id="p-name-dmg">Игрок</span>: <span id="p-total-dmg">0</span></div>
        <div><span id="e-name-dmg">Враг</span>: <span id="e-total-dmg">0</span></div>
        
        <div class="section-sub">Осталось здоровья:</div>
        <div><span id="p-name-hp">Игрок</span>: <span id="p-final-hp">0</span></div>
        <div><span id="e-name-hp">Враг</span>: <span id="e-final-hp">0</span></div>

        <div class="section-sub">Детали (Лог по раундам):</div>
        <div class="combat-logs" id="log-box"></div>
    </div>

    <div class="menu-container">
        <a href="arena_fight.html" id="next-fight-btn" class="menu-link"><span>🪓 Следующий</span><span class="menu-arrow">»»</span></a>
        <a href="duel.html" class="menu-link"><span>⚔️ Дуэль</span><span class="menu-arrow">»»</span></a>
        <a href="hero.html" class="menu-link"><span>📊 Характеристики</span><span class="menu-arrow">»»</span></a>
        <a href="index.html" class="menu-link"><span>🏠 Главная</span><span class="menu-arrow">»»</span></a>
    </div>
    <script>
        function runBattleSimulation() {
            const savedName = localStorage.getItem('barbarians_username') || "Воин";
            const enemyData = JSON.parse(localStorage.getItem('current_arena_enemy'));
            
            if (!enemyData) { window.location.href = 'duel.html'; return; }

            let fightType = enemyData.type || "equal";

            let pLvl = parseInt(localStorage.getItem('barb_lvl') || '1');
            let pSilver = parseInt(localStorage.getItem('barb_silver') || '10000');
            let pGold = parseInt(localStorage.getItem('barb_gold') || '15');
            let pExp = parseInt(localStorage.getItem('barb_exp') || '0');
            let pFame = parseInt(localStorage.getItem('barb_fame') || '0');
            let pGems = parseInt(localStorage.getItem('barb_gems') || '0');

            let pStr = parseInt(localStorage.getItem('barb_str') || '5');
            let pDef = parseInt(localStorage.getItem('barb_def') || '5');
            let pAgi = parseInt(localStorage.getItem('barb_agi') || '5');
            let pMst = parseInt(localStorage.getItem('barb_mst') || '5');
            let pVit = parseInt(localStorage.getItem('barb_vit') || '5');

            let currentBattles = parseInt(localStorage.getItem('barb_battle_count') ?? '3');
            if (currentBattles > 0) {
                currentBattles -= 1;
                localStorage.setItem('barb_battle_count', currentBattles);
            }

            let pMaxHp = 250 + (pVit * 20);
            let eMaxHp = 250 + (enemyData.vit * 20);
            let pCurrentHp = pMaxHp;
            let eCurrentHp = eMaxHp;

            let pDmgSum = 0;
            let eDmgSum = 0;
            let logHtml = "";

            for (let round = 1; round <= 20; round++) {
                if (pCurrentHp <= 0 || eCurrentHp <= 0) break;

                logHtml += `<b>Раунд ${round}:</b><br/>`;

                let pIsDodge = Math.random() < (enemyData.agi * 0.005);
                if (pIsDodge) {
                    logHtml += `• ${enemyData.name} ловко увернулся от твоего удара!<br/>`;
                } else {
                    let pIsCrit = Math.random() < (pMst * 0.01);
                    let baseDmg = Math.max(10, pStr * 3 - enemyData.def);
                    let finalDmg = pIsCrit ? Math.floor(baseDmg * 1.5) : baseDmg;
                    finalDmg = Math.floor(finalDmg * (1 + (Math.random() * 0.2 - 0.1)));

                    eCurrentHp -= finalDmg;
                    pDmgSum += finalDmg;
                    logHtml += `• Ты нанес удар по ${enemyData.name} на <span style="color:#e5e5e5">${finalDmg}</span> ${pIsCrit?'💥 КРИТ!':''}<br/>`;
                }

                if (eCurrentHp <= 0) break;

                let eIsDodge = Math.random() < (pAgi * 0.005);
                if (eIsDodge) {
                    logHtml += `• Ты увернулся от яростной атаки противника!<br/>`;
                } else {
                    let eIsCrit = Math.random() < (enemyData.mst * 0.01);
                    let baseDmgEnemy = Math.max(10, enemyData.str * 3 - pDef);
                    let finalDmgEnemy = eIsCrit ? Math.floor(baseDmgEnemy * 1.5) : baseDmgEnemy;
                    finalDmgEnemy = Math.floor(finalDmgEnemy * (1 + (Math.random() * 0.2 - 0.1)));

                    pCurrentHp -= finalDmgEnemy;
                    eDmgSum += finalDmgEnemy;
                    logHtml += `• ${enemyData.name} ударил тебя на <span style="color:#ff4d4d">${finalDmgEnemy}</span> ${eIsCrit?'💥 КРИТ!':''}<br/>`;
                }
            }

            let playerWon = pCurrentHp > 0 && (eCurrentHp <= 0 || pDmgSum >= eDmgSum);
            
            let silverReward = 0;
            let expReward = 0;
            let fameReward = 0;
            let gemReward = 0;

            if (playerWon) {
                document.getElementById('battle-outcome').className = "win-text";
                document.getElementById('battle-outcome').innerText = "Ты победил";
                document.getElementById('battle-reason').innerText = eCurrentHp <= 0 ? "Причина - противник повержен полностью!" : "Причина - победитель нанес больше суммарного урона";
                
                if (fightType === "senior") {
                    silverReward = Math.floor(Math.random() * 500) + 400;
                    expReward = 2;
                    fameReward = 1;
                    if(Math.random() < 0.2) gemReward = 1;
                } else if (fightType === "boss") {
                    silverReward = Math.floor(Math.random() * 1500) + 1000;
                    expReward = 4;
                    fameReward = 3;
                    gemReward = Math.floor(Math.random() * 2) + 1;
                } else if (fightType === "junior") {
                    silverReward = Math.floor(Math.random() * 100) + 50;
                    expReward = 1;
                } else if (fightType === "mercenaries") {
                    silverReward = Math.floor(Math.random() * 300) + 200;
                    expReward = 1;
                    gemReward = 1; // Гарантированный синий камень
                } else {
                    silverReward = Math.floor(Math.random() * 250) + 150;
                    expReward = 1;
                    if(Math.random() < 0.05) gemReward = 1;
                }

                localStorage.setItem('barb_silver', pSilver + silverReward);
                localStorage.setItem('barb_exp', pExp + expReward);
                localStorage.setItem('barb_fame', pFame + fameReward);
                localStorage.setItem('barb_gems', pGems + gemReward);
            } else {
                document.getElementById('battle-outcome').className = "lose-text";
                document.getElementById('battle-outcome').innerText = "Ты проиграл";
                document.getElementById('battle-reason').innerText = pCurrentHp <= 0 ? "Причина - ты потерял сознание от ран" : "Причина - враг нанес больше суммарного урона";
                
                silverReward = Math.floor(Math.random() * 20) + 10;
                localStorage.setItem('barb_silver', pSilver + silverReward);
            }

            let rewardText = `Серебро: 🪙+${silverReward}<br/>Опыт: ⭐+${expReward}`;
            if (fameReward > 0) rewardText += `<br/>Слава: 🏆+${fameReward}`;
            if (gemReward > 0) rewardText += `<br/>Кристаллы: 💎+${gemReward}`;
            document.getElementById('battle-rewards').innerHTML = rewardText;

            document.getElementById('p-name-dmg').innerText = savedName;
            document.getElementById('p-total-dmg').innerText = pDmgSum;
            document.getElementById('e-name-dmg').innerText = enemyData.name;
            document.getElementById('e-total-dmg').innerText = eDmgSum;

            document.getElementById('p-name-hp').innerText = savedName;
            document.getElementById('p-final-hp').innerText = Math.max(0, pCurrentHp);
            document.getElementById('e-name-hp').innerText = enemyData.name;
            document.getElementById('e-final-hp').innerText = Math.max(0, eCurrentHp);

            document.getElementById('log-box').innerHTML = logHtml;

            document.getElementById('header-player-name').innerText = savedName;
            document.getElementById('header-lvl').innerHTML = `👑 ${pLvl}`;
            document.getElementById('header-hp').innerText = pMaxHp;
            document.getElementById('header-def').innerText = pDef;
            document.getElementById('header-silver').innerText = `🪙 ${pSilver + silverReward}`;
            document.getElementById('header-gold').innerText = `💰 ${pGold}`;
            document.getElementById('header-gems').innerText = pGems + gemReward;
            document.getElementById('header-battles').innerText = `${currentBattles}/3`;

            document.getElementById('next-fight-btn').href = `arena_fight.html?type=${fightType}`;
        }

        document.addEventListener("DOMContentLoaded", runBattleSimulation);
    </script>
</body>
</html>
