<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Герой</title>
    <style>
        body { background: #000b14; color: #fff; font-family: sans-serif; margin: 0; padding: 0; font-size: 14px; }
        .header { background: linear-gradient(180deg, #0d1a26 0%, #050d14 100%); padding: 8px; text-align: center; font-weight: bold; font-size: 16px; color: #00ffcc; border-bottom: 1px solid #1a334d; }
        .content { padding: 10px; text-align: center; }
        .avatar-img { max-width: 150px; max-height: 200px; border: 2px solid #1a334d; border-radius: 5px; background: #030a12; object-fit: contain; margin-bottom: 10px; }
        .menu-list { margin-top: 15px; border-top: 1px solid #1a334d; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, #07131f 0%, #030a12 100%); padding: 10px 12px; border-bottom: 1px solid #102233; text-decoration: none; color: #3b9eff; font-weight: bold; }
        .menu-item .arrow { color: #00ffcc; font-family: monospace; }
    </style>
</head>
<body>

    <div class="header">Герой</div>

    <div class="content">
        <!-- Сюда автоматически подставится нужная аватарка -->
        <img id="hero-current-avatar" src="" alt="Герой" class="avatar-img">
    </div>

    <!-- Кнопки меню из оригинальной игры -->
    <div class="menu-list">
        <a href="#" class="menu-item"><span>🤠 Детали</span><span class="arrow">&gt;&gt;</span></a>
        <a href="#" class="menu-item"><span>📝 Анкета (редактирование)</span><span class="arrow">&gt;&gt;</span></a>
        <a href="#" class="menu-item"><span>👑 Профиль</span><span class="arrow">&gt;&gt;</span></a>
        <a href="#" class="menu-item"><span>💪 Тренировка</span><span class="arrow">&gt;&gt;</span></a>
        <a href="#" class="menu-item"><span>⚔️ Экипировка</span><span class="arrow">&gt;&gt;</span></a>
        <a href="#" class="menu-item"><span>📜 Надписи</span><span class="arrow">&gt;&gt;</span></a>
        
        <!-- НАША СВЯЗАННАЯ КНОПКА АВАТАРКИ -->
        <a href="аватарка.html" class="menu-item"><span>🖼️ Аватарка</span><span class="arrow">&gt;&gt;</span></a>
        
        <a href="#" class="menu-item"><span>👥 Пригласить</span><span class="arrow">&gt;&gt;</span></a>
        <a href="index.html" class="menu-item"><span>↩️ Назад (В поселок)</span><span class="arrow">&gt;&gt;</span></a>
    </div>

    <script>
        // Код подгрузки аватарки на экран героя
        (function() {
            let defData = { gold: 184491, hp: 172365, level: 15, energy: 3, fame: 83258, nextRegenTime: 0, stats: { strength: 5, defense: 5, agility: 5, mastery: 5, vitality: 5 } };
            let heroData = JSON.parse(localStorage.getItem('barb_save')) || defData;
            
            // Если аватарки в сохранении нет, ставим дефолтного варвара с мечом
            let currentAvatar = heroData.avatarUrl || "https://nocookie.net";
            document.getElementById('hero-current-avatar').src = currentAvatar;
        })();
    </script>
</body>
</html>
