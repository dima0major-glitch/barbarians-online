<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
    /* Каноничный серо-синий WAP-стиль Норманнов */
    body {
        background-color: #0d1b2a;
        color: #e0e1dd;
        font-family: Arial, sans-serif;
        font-size: 15px;
        margin: 0;
        padding: 0;
    }
    a { text-decoration: none; display: block; }
    
    .main-content {
        padding: 5px;
    }
    
    /* Блок отображения героя */
    .hero-container {
        background-color: #1b263b;
        border: 1px solid #415a77;
        padding: 15px 10px;
        text-align: center;
        margin-bottom: 5px;
    }
    .hero-title {
        font-size: 18px;
        font-weight: bold;
        color: #ffffff;
        margin-bottom: 12px;
    }
    .avatar-img {
        width: 100%;
        max-width: 200px;
        height: auto;
        border: 2px solid #415a77;
        border-radius: 4px;
        display: block;
        margin: 0 auto;
    }

    /* WAP-Кнопки меню */
    .wap-menu-btn {
        background: linear-gradient(to bottom, #1b263b, #0d1b2a);
        border: 1px solid #415a77;
        color: #ffffff;
        padding: 10px 12px;
        margin: 4px 0;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
    }
    .wap-menu-btn::after { content: '»'; color: #00b4d8; font-size: 18px; }
    
    /* Специфический стиль для кнопки Назад/Главная */
    .btn-nav {
        background: linear-gradient(to bottom, #2c3e55, #162238);
    }

    /* Всплывающее WAP-окно для покупки Аватарки */
    .avatar-modal {
        display: none;
        background-color: #111a2e;
        border: 1px solid #ffcc00;
        padding: 12px;
        margin: 5px 0;
        text-align: center;
        font-size: 13px;
    }
    .avatar-modal input {
        width: 85%;
        padding: 6px;
        margin: 8px 0;
        background-color: #0d1b2a;
        border: 1px solid #415a77;
        color: #fff;
    }
    .wap-btn {
        background-color: #415a77;
        color: #fff;
        border: 1px solid #778da9;
        padding: 6px 15px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
    }
    .text-gold { color: #ffcc00; }
</style>
<!-- Подключаем единое ядро игры -->
<script src="global_core.js"></script>

<!-- Верхняя шапка ядра -->
<div id="core-header"></div>

<div class="main-content">

    <!-- Контейнер с аватаром -->
    <div class="hero-container">
        <div class="hero-title">Герой</div>
        <img id="hero-avatar-img" class="avatar-img" src="" alt="Герой">
    </div>

    <!-- КНОПКИ МЕНЮ ИЗ СКРИНШОТА -->
    
    <!-- Переход на созданный нами profile.html (где лежат все параметры и статы по 5) -->
    <a href="profile.html">
        <div class="wap-menu-btn">🤠 Детали</div>
    </a>
    
    <div class="wap-menu-btn">📝 Анкета (редактирование)</div>
    
    <a href="profile.html">
        <div class="wap-menu-btn">🤠 Профиль</div>
    </a>
    
    <div class="wap-menu-btn">💪 Тренировка</div>
    <div class="wap-menu-btn">⚔️ Экипировка</div>
    <div class="wap-menu-btn">📝 Надписи</div>
    
    <!-- Кнопка Аватарка: при нажатии открывает меню смены прямо здесь -->
    <div class="wap-menu-btn" onclick="toggleAvatarShop()">📝 Аватарка</div>
    
    <!-- Скрытый блок покупки, который плавно открывается по нажатию -->
    <div id="avatar-shop-block" class="avatar-modal">
        🖼️ <strong>Установка личной аватарки</strong><br>
        Вставь URL-ссылку на картинку в поле ниже:<br>
        <span class="text-gold">Стоимость услуги: 💰 10 золота</span><br>
        <input type="text" id="pop-avatar-url" placeholder="https://site.com">
        <br>
        <button class="wap-btn" onclick="buyHeroAvatar()">Применить за 10 золота</button>
    </div>

    <div class="wap-menu-btn">👥 Пригласить</div>
    
    <a href="poselok.html">
        <div class="wap-menu-btn btn-nav">↪️ Назад</div>
    </a>
    
    <a href="index.html">
        <div class="wap-menu-btn btn-nav">🏠 Главная</div>
    </a>

</div> <!-- /main-content -->

<!-- Нижний футер ядра -->
<div id="core-footer"></div>

<script>
    // Дефолтный брутальный варвар для новичков
    const DEFAULT_HERO_AVATAR = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAoHCBYVFRgVFRYYGRgZGBgaHBocGRkaGBgaGhoaGhocGhwcIS4fHB4rHBgYJjgmKy8xNTU1GiQ7QDs0Py40NTEBDAwMEA8QHhISHzQrJCQ0NDQ0NDQ0NDQ4NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NP/AABEIAOEA4QMBIgACEQEDEQH/xAAbAAABBQEBAAAAAAAAAAAAAAADAQIEBQYAB//EAD4QAAIBAgQDBgUCBAUDBAMAAAECEQAhAxIxQVFhBBIicYGRBRMyobFCwVJictHh8AYUI4KSg6KywvFTY8P/xAAaAQADAQEBAQEAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999MAwBAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QAIhEBAQACAwEAAwEAAwAAAAAAAAECEQMhMRJBIgRRYRMU/999M";

    document.addEventListener("DOMContentLoaded", function() {
        // Проверяем и отрисовываем шапки ядра
        if (typeof window.initCore === "function") window.initCore();

        // Подгружаем аватарку игрока (если покупал — свою, если нет — варвара)
        const currentAvatar = localStorage.getItem('barb_custom_avatar');
        document.getElementById('hero-avatar-img').src = currentAvatar ? currentAvatar : DEFAULT_HERO_AVATAR;
    });

    // Открытие/закрытие плашки смены аватара
    function toggleAvatarShop() {
        const block = document.getElementById('avatar-shop-block');
        block.style.display = (block.style.display === "block") ? "none" : "block";
    }

    // Покупка аватара за 10 золота прямо с экрана Героя
    function buyHeroAvatar() {
        const inputUrl = document.getElementById('pop-avatar-url').value.trim();
        if(!inputUrl) return alert("Введите рабочую URL ссылку на картинку!");

        let gold = parseInt(localStorage.getItem('barb_gold')) || 0;
        if(gold < 10) return alert("❌ Недостаточно золота! Нужно 💰 10 монет.");

        // Списание и сохранение
        localStorage.setItem('barb_gold', gold - 10);
        localStorage.setItem('barb_custom_avatar', inputUrl);
        document.getElementById('hero-avatar-img').src = inputUrl;
        
        // Отправка события в events.html через ядро
        if(typeof window.addGameEvent === "function") {
            window.addGameEvent('Подарки', 'Личное', `Установлена новая аватарка через меню Героя.`, false);
        }

        alert("👑 Картинка успешно обновлена!");
        location.reload(); // Перезагружаем, чтобы обновилось золото в верхней шапке ядра
    }
</script>
