<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары Онлайн</title>
    <!-- Исправленное подключение библиотеки для мобильных устройств -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background-color: #0d1216; color: #d1d5db; font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 480px; background-color: #06090c; border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; min-height: 100vh; box-sizing: border-box; }
        .header { background: linear-gradient(180deg, #111827 0%, #030712 100%); border-bottom: 2px solid #1f2937; padding: 10px; text-align: center; font-weight: bold; color: #38bdf8; text-transform: uppercase; font-size: 16px; }
        .banner { width: 100%; height: auto; display: block; border-bottom: 3px solid #1f2937; max-height: 250px; object-fit: cover; }
        .description-box { padding: 20px; text-align: center; font-size: 14px; line-height: 1.6; color: #9ca3af; }
        .btn-register-container { display: flex; justify-content: center; padding: 15px 0; background: #030712; }
        .btn-fire { background: linear-gradient(180deg, #b45309 0%, #78350f 100%); color: #fef08a; border: 2px solid #ea580c; padding: 12px 40px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; display: inline-block; }
        .nav-bar { background: linear-gradient(90deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%); border-top: 1px solid #2563eb; border-bottom: 1px solid #2563eb; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #60a5fa; font-weight: bold; font-size: 15px; }
        .form-screen { padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .form-group { width: 100%; max-width: 300px; margin-bottom: 15px; text-align: center; }
        .form-group label { display: block; margin-bottom: 8px; color: #e5e7eb; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background-color: #374151; border: 1px solid #4b5563; color: #fff; font-size: 16px; box-sizing: border-box; text-align: center; border-radius: 4px; }
        .captcha-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .captcha-img { background: #1e293b; padding: 8px 20px; font-size: 20px; font-weight: bold; color: #f43f5e; border: 1px dashed #475569; }
        .btn-refresh { background: #374151; border: 1px solid #4b5563; color: #fff; padding: 8px 12px; }
        .footer { padding: 20px; text-align: center; font-size: 11px; color: #4b5563; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">⚔️ Варвары Онлайн ⚔️</div>

        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="main-screen">
            <img class="banner" src="https://unsplash.com" alt="Варвары">
            <div class="description-box">
                Новая историческая игра Варвары!<br>
                Массовые сражения, приключения, общение в реальном времени прямо со страниц браузера!
            </div>
            <div class="btn-register-container">
                <button type="button" class="btn-fire" onclick="switchScreen('reg-screen')">Начать новую игру</button>
            </div>
            <div class="nav-bar" onclick="switchScreen('auth-screen')">
                <span>🔹 Войти</span>
                <span>»»</span>
            </div>
        </div>

        <!-- ФОРМА ВХОДА -->
        <div id="auth-screen" class="hidden">
            <form class="form-screen" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Введите логин</label>
                    <input type="text" id="login-input" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Введите пароль</label>
                    <input type="password" id="password-input" required>
                </div>
                <div class="form-group">
                    <div class="captcha-container">
                        <div class="captcha-img" id="captcha-text">10+5=</div>
                        <button type="button" class="btn-refresh" onclick="generateCaptcha()">🔄</button>
                    </div>
                    <input type="number" id="captcha-input" placeholder="Ответ" required>
                </div>
                <button type="submit" class="btn-fire">Войти</button>
            </form>
            <div class="nav-bar" onclick="switchScreen('main-screen')">
                <span>🏡 Главная</span>
                <span>»»</span>
            </div>
        </div>

        <!-- СОЗДАНИЕ ПЕРСОНАЖА -->
        <div id="reg-screen" class="hidden">
            <form class="form-screen" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Имя твоего героя</label>
                    <input type="text" id="reg-username" placeholder="Ник..." required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Пароль для входа</label>
                    <input type="password" id="reg-password" placeholder="Пароль..." required>
                </div>
                <div class="form-group">
                    <label>Выберите класс</label>
                    <select id="reg-class" required>
                        <option value="Воин">⚔️ Воин</option>
                        <option value="Разбойник">🗡️ Разбойник</option>
                        <option value="Шаман">🔮 Шаман</option>
                    </select>
                </div>
                <button type="submit" class="btn-fire">Создать героя</button>
            </form>
            <div class="nav-bar" onclick="switchScreen('main-screen')">
                <span>🏡 На главную</span>
                <span>»»</span>
            </div>
        </div>

        <div class="footer">BARBARIANS ONLINE, 2026</div>
    </div>

    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "sb_publishable_OV9BDFENvvNtqENXKDB6YQ_Kxda-QZv";
        
        let _supabase;
        
        // Безопасное подключение к объекту window для мобильных браузеров
        function initSupabase() {
            if (window.supabase) {
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            } else {
                setTimeout(initSupabase, 100);
            }
        }
        initSupabase();

        function switchScreen(screenId) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
            if(screenId === 'auth-screen') { generateCaptcha(); }
        }

        let currentCaptchaResult = 0;
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 20) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            currentCaptchaResult = num1 + num2;
            document.getElementById('captcha-text').innerText = num1 + '+' + num2 + '=';
            document.getElementById('captcha-input').value = '';
        }

        async function handleRegister(event) {
            event.preventDefault();
            if (!_supabase) { alert("База данных ещё загружается, подождите секунду..."); return; }
            
            const username = document.getElementById('reg-username').value.trim();
            const email = username + "@barbarians.game";
            const password = document.getElementById('reg-password').value;
            const heroClass = document.getElementById('reg-class').value;

            alert("Отправляем запрос регистрации для: " + username);

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
                options: { data: { hero_class: heroClass } }
            });

            if (error) {
                alert('Ошибка от Supabase: ' + error.message);
            } else {
                alert('Успех! Герой создан. Переходим на вход.');
                switchScreen('auth-screen');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            if (!_supabase) { alert("База данных ещё загружается, подождите секунду..."); return; }
            
            const userAnswer = parseInt(document.getElementById('captcha-input').value);
            if (userAnswer !== currentCaptchaResult) {
                alert('Капча неверна!');
                return;
            }
            const email = document.getElementById('login-input').value.trim() + "@barbarians.game";
            const password = document.getElementById('password-input').value;

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert('Ошибка входа: ' + error.message);
            } else {
                alert('Вы вошли! Класс: ' + (data.user.user_metadata.hero_class || "Варвар"));
            }
        }
    </script>
</body>
</html>
