<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль игрока</title>
    <style>
        /* Оригинальные WAP-стили Норманнов */
        body { 
            background: #000b14; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            font-size: 14px;
        }

        .content {
            padding: 15px;
            text-align: center;
        }

        /* Центрирование и рамка для аватара */
        .avatar-container {
            margin: 0 auto 10px auto;
            max-width: 150px;
            text-align: center;
        }

        .avatar-img {
            max-width: 150px;
            max-height: 200px;
            object-fit: contain;
        }

        .flag-line {
            margin: 5px 0 15px 0;
            font-size: 16px;
        }

        /* Списки инфо-текста */
        .info-list {
            text-align: left;
            max-width: 300px;
            margin: 0 auto 15px auto;
            line-height: 1.6;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        /* Цвета как в игре */
        .status-offline { color: #888; }
        .clan-none { color: #fff; }
        .brotherhood-text { color: #fbbf24; font-weight: bold; }
        .green-tag { color: #22c55e; }

        /* Списки меню навигации */
        .menu-list {
            border-top: 1px solid #1a334d;
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #07131f 0%, #030a12 100%);
            padding: 10px 12px;
            border-bottom: 1px solid #102233;
            text-decoration: none;
            color: #3b9eff;
            font-weight: bold;
        }

        .menu-item:active {
            background: #0d1a26;
        }
        
        .menu-item .arrow { 
            color: #00ffcc; 
            font-family: monospace; 
        }

        /* Разделитель между блоками меню */
        .menu-divider {
            height: 4px;
            background: #102233;
            border-top: 1px solid #1a334d;
            border-bottom: 1px solid #1a334d;
        }
    </style>
</head>
<body>

    <div class="content">
        <!-- Твой новый крутой варвар вместо мухи -->
        <div class="avatar-container">
            <img id="ui-profile-avatar" src="" alt="Аватар" class="avatar-img">
        </div>

        <div class="flag-line">🇺🇦</div>

        <!-- Информационный блок точь-в-точь по скриншоту -->
        <div class="info-list">
            <div class="info-item status-offline">⚪ Сейчас не играет (20:43 08 июля 2026)</div>
            <div class="info-item">🏵️ Уровень: <strong id="ui-level">15</strong></div>
            <div class="info-item">🛡️ Клан: <span class="clan-none">Не состоит в клане</span></div>
            <div class="info-item">🤝 Братство: <span class="brotherhood-text">Дом</span> <span class="green-tag">(твое)</span></div>
            <div class="info-item">🌿 Слава: <strong id="ui-fame">83258</strong></div>
            <div class="info-item">👥 Статус: <span>Лучший друг</span></div>
        </div>
    </div>

    <!-- Основные кнопки профиля по твоему плану -->
    <div class="menu-list">
        <a href="тренировка.html" class="menu-item">
            <span>📊 Характеристики</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="#" class="menu-item">
            <span>🎖️ Достижения</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="#" class="menu-item">
            <span>🎁 Подарки (5)</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="#" class="menu-item">
            <span>💀 Проклятия</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="анкета.html" class="menu-item">
            <span>📝 Анкета</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="hero.html" class="menu-item">
            <span>↩️ Назад</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
    </div>

    <!-- Разделительная полоса перед главным меню -->
    <div class="menu-divider"></div>

    <!-- Нижнее меню навигации -->
    <div class="menu-list">
        <a href="index.html" class="menu-item">
            <span>🏠 Главная</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="hero.html" class="menu-item">
            <span>🤠 Герой</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="#" class="menu-item">
            <span>✉️ Почта</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="#" class="menu-item">
            <span>💬 Чат</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
    </div>

    <script>
        // Подгрузка базы данных
        let defData = { gold: 184491, hp: 172365, level: 15, energy: 3, fame: 83258, nextRegenTime: 0, stats: { strength: 5, defense: 5, agility: 5, mastery: 5, vitality: 5 } };
        let heroData = JSON.parse(localStorage.getItem('barb_save')) || defData;

        // Картинка сурового варвара с мечом (которую ты выбрал в прошлых смс)
        const MY_BARBARIAN_AVATAR = "https://imgur.com";

        function initProfile() {
            // Подставляем аватарку (если игрок загрузил свою — покажется она, если нет — твой варвар)
            document.getElementById('ui-profile-avatar').src = heroData.avatarUrl || MY_BARBARIAN_AVATAR;
            
            // Подгружаем уровень и славу
            document.getElementById('ui-level').innerText = heroData.level;
            document.getElementById('ui-fame').innerText = heroData.fame;
        }

        initProfile();
    </script>
</body>
</html>
