<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Варвары — Итог боя</title>
    <style>
        /* Стилизация под серо-синий WAP-дизайн Норманнов */
        body { 
            background-color: #061118; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
        }
        .category-bar { 
            background: linear-gradient(to bottom, #123524, #05140d); 
            color: #00ffaa; 
            font-size: 14px; 
            font-weight: bold; 
            text-align: center; 
            padding: 6px 15px; 
            border-top: 1px solid #1d5339; 
            border-bottom: 1px solid #040f0a; 
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1); 
            text-transform: uppercase; 
        }
        .result-container { 
            background-color: #050d12; 
            padding: 15px; 
            border-bottom: 1px solid #0f2231; 
            font-size: 14px; 
            line-height: 1.5; 
            color: #adc8d9; 
        }
        .win-text { color: #00ffaa; font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .lose-text { color: #ff4d4d; font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .section-sub { color: #ffffff; margin-top: 10px; font-weight: bold; }
        .combat-logs { 
            font-size: 11px; 
            background: #03080b; 
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid #0f2231; 
            margin-top: 10px; 
            max-height: 150px; 
            overflow-y: auto; 
            line-height: 1.4; 
            color: #799bb3; 
        }
        .menu-container { margin-top: 2px; }
        .menu-link { 
            background: linear-gradient(to bottom, #091b29, #050e16); 
            padding: 13px 15px; 
            margin-bottom: 2px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #0f2231; 
            text-decoration: none; 
            color: #adc8d9; 
            font-size: 14px; 
            font-weight: bold; 
        }
        .menu-arrow { color: #1c8cd1; font-weight: bold; letter-spacing: -2px; font-size: 15px; }
    </style>
</head>
<body>
    <!-- Место для автоматической шапки из global_core.js -->
    <div id="core-header-placeholder"></div>

    <div class="category-bar">Итог боя</div>
    <div class="result-container">
        <div id="battle-outcome">Расчет поединка...</div>
        <div id="battle-reason"></div>
        
        <div class="section-sub">Награда:</div>
        <div id="battle-rewards"></div>
        
        <div class="section-sub">Нанесенный урон:</div>
        <div><span id="p-name-dmg">Игрок</span>: <span id="p-total-dmg">0</span></div>
        <div><span id="e-name-dmg">Враг</span>: <span id="e-total-dmg">0</span></div>
        
        <div class="section-sub">Осталось здоровья:</div>
        <div><span id="p-name-hp">Игрок</span>: <span id="p-final-hp">0</span></div>
        <div><span id="e-name-hp">Враг</span>: <span id="e-final-hp">0</span></div>
        
        <div class="section-sub">Детали (Лог по раундам):</div>
        <div class="combat-logs" id="log-box"></div>
    </div>

    <!-- Текстовые ссылки переходов (WAP-style) -->
    <div class="menu-container">
        <a href="arena.html" id="next-fight-btn" class="menu-link"><span>🪓 Следующий бой</span><span class="menu-arrow">»»</span></a>
        <a href="arena.html" class="menu-link"><span>⚔️ Вернуться на Арену</span><span class="menu-arrow">»»</span></a>
        <a href="profile.html" class="menu-link"><span>📊 В характеристики</span><span class="menu-arrow">»»</span></a>
        <a href="hero.html" class="menu-link"><span>🏠 На главную</span><span class="menu-arrow">»»</span></a>
    </div>

    <!-- Подключаем сквозное ядро игры -->
    <script src="global_core.js"></script>
    <script>
        // Прогрессия опыта
        function getMaxExpForLvl(level) {
            if (level <= 1) return 15;
            return Math.floor(Math.pow(level - 1, 2) * 10 + 15);
        }

        function runBattleSimulation() {
            const savedName = localStorage.getItem('barbarians_username') || "Воин";
            const enemyData = JSON.parse(localStorage.getItem('current_enemy_data'));
            
            // Если зашли напрямую без генерации врага — уходим на Арену
            if (!enemyData) { window.location.href = 'arena.html'; return; }

            const urlParams = new URLSearchParams(window.location.search);
            const currentFightType = urlParams.get('type') || 'equal';

            // Безопасное числовое приведение параметров игрока
            let pLvl = parseInt(localStorage.getItem('barb_level') || '1');
            let pGold = parseInt(localStorage.getItem('barb_gold') || '15');
            let pSilver = parseInt(localStorage.getItem('barb_silver') || '1000');
            let pExp = parseInt(localStorage.getItem('barb_exp') || '0');
            let pFame = parseInt(localStorage.getItem('barb_fame') || '0');

            let pStr = parseInt(localStorage.getItem('barb_str') || '5');
            let pDef = parseInt(localStorage.getItem('barb_def') || '5');
            let pAgi = parseInt(localStorage.getItem('barb_dex') || '5'); 
            let pMst = parseInt(localStorage.getItem('barb_mst') || '5');
            let pVit = parseInt(localStorage.getItem('barb_vit') || '5');

            // Подсчет бонусов экипировки
            let equipped = JSON.parse(localStorage.getItem('barb_equipped') || '{}');
            for (let slot in equipped) {
                let item = equipped[slot];
                if (item && item.bonus) {
                    if (item.bonus.str) pStr += parseInt(item.bonus.str || 0);
                    if (item.bonus.def) pDef += parseInt(item.bonus.def || 0);
                    if (item.bonus.agi) pAgi += parseInt(item.bonus.agi || 0);
                    if (item.bonus.mst) pMst += parseInt(item.bonus.mst || 0);
                    if (item.bonus.vit) pVit += parseInt(item.bonus.vit || 0);
                }
            }

            // Безопасное числовое приведение параметров противника
            let eLvl = parseInt(enemyData.lvl || enemyData.level || 1);
            let eStr = parseInt(enemyData.str || 5);
            let eDef = parseInt(enemyData.def || 5);
            let eAgi = parseInt(enemyData.agi || enemyData.dex || 5);
            let eMst = parseInt(enemyData.mst || 5);
            let eVit = parseInt(enemyData.vit || 5);

            // Динамический расчет запаса здоровья
            let pMaxHp = pVit * 20;
            let eMaxHp = eVit * 20;
            let pCurrentHp = pMaxHp; 
            let eCurrentHp = eMaxHp;
            
            let pDmgSum = 0; 
            let eDmgSum = 0; 
            let logHtml = "";

            // Математический цикл симуляции по раундам
            for (let round = 1; round <= 20; round++) {
                if (pCurrentHp <= 0 || eCurrentHp <= 0) break;
                logHtml += `<b>Раунд ${round}:</b><br/>`;
                
                // --- АТАКА ИГРОКА ---
                let pIsDodge = Math.random() < (eAgi * 0.005);
                if (pIsDodge) { 
                    logHtml += `• ${enemyData.name} увернулся!<br/>`; 
                } else {
                    let pIsCrit = Math.random() < (pMst * 0.01);
                    let baseDmg = Math.max(10, pStr * 3 - eDef);
                    let finalDmg = pIsCrit ? Math.floor(baseDmg * 1.5) : baseDmg;
                    finalDmg = Math.floor(finalDmg * (1 + (Math.random() * 0.2 - 0.1)));
                    if (finalDmg < 1) finalDmg = 1;

                    eCurrentHp -= finalDmg; 
                    pDmgSum += finalDmg;
                    logHtml += `• Ты нанес удар на <span style="color:#e5e5e5">${finalDmg}</span> ${pIsCrit?'💥 КРИТ!':''}<br/>`;
                }
                
                if (eCurrentHp <= 0) break;

                // --- АТАКА ВРАГА ---
                let eIsDodge = Math.random() < (pAgi * 0.005);
                if (eIsDodge) { 
                    logHtml += `• Ты увернулся!<br/>`; 
                } else {
                    let eIsCrit = Math.random() < (eMst * 0.01);
                    let baseDmgE = Math.max(10, eStr * 3 - pDef);
                    let finalDmgE = eIsCrit ? Math.floor(baseDmgE * 1.5) : baseDmgE;
                    finalDmgE = Math.floor(finalDmgE * (1 + (Math.random() * 0.2 - 0.1)));
                    if (finalDmgE < 1) finalDmgE = 1;

                    pCurrentHp -= finalDmgE; 
                    eDmgSum += finalDmgE;
                    logHtml += `• ${enemyData.name} нанес удар на <span style="color:#ffbfcc">${finalDmgE}</span> ${eIsCrit?'💥 КРИТ!':''}<br/>`;
                }
            }
            // Определение результатов боя
            let isWin = (eCurrentHp <= 0 && pCurrentHp > 0) || (pCurrentHp > 0 && eCurrentHp > 0 && pCurrentHp >= eCurrentHp);
            let outcomeText = isWin ? `<div class="win-text">🏆 ПОБЕДА!</div>` : `<div class="lose-text">💀 ПОРАЖЕНИЕ</div>`;
            let reasonText = isWin ? `Ты одолел соперника ${enemyData.name}!` : `${enemyData.name} оказался сильнее...`;

            let rewGold = 0; 
            let rewExp = 0; 
            let rewFame = 0;
            let silverLoss = 0;

            // Расчет наград по правилам ТЗ
            if (isWin) {
                rewFame = Math.floor(2 + Math.random() * 3);
                
                if (currentFightType === 'mercenaries' || currentFightType === 'by_level') {
                    rewGold = Math.floor(10 + Math.random() * 6);
                    rewExp = Math.floor(5 + Math.random() * 5);
                } else if (currentFightType === 'boss') {
                    rewGold = Math.floor(30 + Math.random() * 21);
                    rewExp = Math.floor(15 + Math.random() * 11);
                } else if (currentFightType === 'senior') {
                    rewGold = Math.floor(15 + Math.random() * 10);
                    rewExp = Math.floor(25 + Math.random() * 16); // 25-40 опыта за Старших
                } else {
                    rewGold = Math.floor(5 + Math.random() * 5) * eLvl;
                    rewExp = Math.floor(3 + Math.random() * 4);
                }

                // Инкремент побед для работающего профиля
                let wins = parseInt(localStorage.getItem('stat_wins') || '0');
                localStorage.setItem('stat_wins', (wins + 1).toString());

            } else {
                // Штраф на серебро при поражении
                silverLoss = Math.floor(30 + Math.random() * 51); 
                if (pSilver < silverLoss) silverLoss = pSilver; 
                
                pSilver -= silverLoss;
                localStorage.setItem('barb_silver', pSilver.toString());

                // Запись «Потерял серебра» для статистики профиля
                let lostSilverStat = parseInt(localStorage.getItem('stat_lost_silver') || '0');
                localStorage.setItem('stat_lost_silver', (lostSilverStat + silverLoss).toString());

                // Утешительный опыт
                rewExp = Math.floor(1 + Math.random() * 2);
                
                // Инкремент проигрышей для работающего профиля
                let losses = parseInt(localStorage.getItem('stat_losses') || '0');
                localStorage.setItem('stat_losses', (losses + 1).toString());
            }

            // Изменение текущего баланса
            pGold += rewGold;
            pExp += rewExp;
            pFame += rewFame;

            // Расход доступных ежедневных боев Арены
            let battleCount = parseInt(localStorage.getItem('barb_battle_count') || '3');
            if (battleCount > 0) {
                localStorage.setItem('barb_battle_count', (battleCount - 1).toString());
            }

            // Расчет повышения уровня
            let maxExp = getMaxExpForLvl(pLvl);
            let leveledUp = false;
            while (pExp >= maxExp) {
                pExp -= maxExp;
                pLvl += 1;
                maxExp = getMaxExpForLvl(pLvl);
                leveledUp = true;
            }

            // Сохранение изменений в LocalStorage
            localStorage.setItem('barb_level', pLvl.toString());
            localStorage.setItem('barb_gold', pGold.toString());
            localStorage.setItem('barb_exp', pExp.toString());
            localStorage.setItem('barb_fame', pFame.toString());

            // Вывод данных в HTML-элементы экрана
            document.getElementById('battle-outcome').innerHTML = outcomeText;
            document.getElementById('battle-reason').textContent = reasonText;
            
            let rewardsResultHtml = "";
            if (isWin) {
                rewardsResultHtml = `🪙 Золото: +${rewGold} | 📈 Опыт: +${rewExp}`;
                if (rewFame > 0) rewardsResultHtml += ` | 👑 Слава: +${rewFame}`;
            } else {
                rewardsResultHtml = `🔻 Потеряно серебра: <span style="color:#ff4d4d">-${silverLoss}</span> | 📈 Опыт: +${rewExp}`;
            }

            if (leveledUp) {
                rewardsResultHtml += `<br/><span style="color:#fbbf24; font-weight:bold;">⚡ УРОВЕНЬ ПОВЫШЕН ДО ${pLvl}!</span>`;
            }
            document.getElementById('battle-rewards').innerHTML = rewardsResultHtml;

            // Отображение урона и здоровья участников
            document.getElementById('p-name-dmg').textContent = savedName;
            document.getElementById('p-total-dmg').textContent = pDmgSum;
            document.getElementById('e-name-dmg').textContent = enemyData.name;
            document.getElementById('e-total-dmg').textContent = eDmgSum;

            document.getElementById('p-name-hp').textContent = savedName;
            document.getElementById('p-final-hp').textContent = `${Math.max(0, pCurrentHp)} / ${pMaxHp}`;
            document.getElementById('e-name-hp').textContent = enemyData.name;
            document.getElementById('e-final-hp').textContent = `${Math.max(0, eCurrentHp)} / ${eMaxHp}`;

            // Заполнение текстового лога по раундам
            document.getElementById('log-box').innerHTML = logHtml;

            // Очищаем противника для предотвращения перезапуска боя по клавише F5
            localStorage.removeItem('current_enemy_data');

            // Принудительный вызов перерисовки шапки, если функция есть в ядре
            if (typeof updateCoreHeader === 'function') { updateCoreHeader(); }
        }

        // Автозапуск симуляции после построения интерфейса
        document.addEventListener('DOMContentLoaded', runBattleSimulation);
    </script>
</body>
</html>
