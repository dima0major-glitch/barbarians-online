<script>
    let defData = { gold: 184491, hp: 172365, level: 15, energy: 3, fame: 83258, nextRegenTime: 0, stats: { strength: 5, defense: 5, agility: 5, mastery: 5, vitality: 5 } };
    let heroData = JSON.parse(localStorage.getItem('barb_save')) || defData;
    const REGEN_DELAY = 300;

    function save() { 
        localStorage.setItem('barb_save', JSON.stringify(heroData)); 
    }

    function checkRegen() {
        let now = Math.floor(Date.now() / 1000);
        if (heroData.energy < 3 && heroData.nextRegenTime !== 0) {
            while (now >= heroData.nextRegenTime && heroData.energy < 3) {
                heroData.energy += 1;
                heroData.nextRegenTime = (heroData.energy < 3) ? heroData.nextRegenTime + REGEN_DELAY : 0;
                save();
            }
        }
    }

    function updateUI() {
        checkRegen();
        let now = Math.floor(Date.now() / 1000);
        let tText = "00:00:00";
        if (heroData.energy < 3 && heroData.nextRegenTime > now) {
            let d = heroData.nextRegenTime - now;
            let m = Math.floor(d / 60); let s = d % 60;
            tText = "00:" + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        }

        let dObj = new Date();
        let hrs = dObj.getHours(); let mins = dObj.getMinutes(); let secs = dObj.getSeconds();
        let clockText = (hrs < 10 ? "0" : "") + hrs + ":" + (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;

        document.getElementById("ui-gold").innerText = heroData.gold.toLocaleString('ru-RU');
        document.getElementById("ui-hp").innerText = heroData.hp.toLocaleString('ru-RU');
        document.getElementById("ui-energy").innerText = heroData.energy + "/3";
        document.getElementById("ui-timer").innerText = tText;
        document.getElementById("ui-clock").innerText = clockText;
    }
    setInterval(updateUI, 1000); updateUI();
</script>
