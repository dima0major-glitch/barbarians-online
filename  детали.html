<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали персонажа</title>
    <style>
        body { 
            background: #000b14; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            font-size: 14px;
        }
        
        .header {
            background: linear-gradient(180deg, #0d1a26 0%, #050d14 100%);
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #1a334d;
        }

        .content {
            padding: 15px;
            text-align: center;
        }

        .char-name {
            color: #ffcc00;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Контейнер для аватара */
        .avatar-container {
            margin: 10px auto;
            max-width: 150px;
            text-align: center;
        }

        .avatar-img {
            max-width: 150px;
            max-height: 200px;
            border: 1px solid #26405a;
            background: #030a12;
            object-fit: contain;
        }

        .flag-line {
            margin: 10px 0 15px 0;
            font-size: 16px;
        }

        /* Список параметров персонажа */
        .stats-list {
            text-align: left;
            max-width: 280px;
            margin: 0 auto 20px auto;
            line-height: 1.8;
        }

        .status-online {
            color: #00ff00;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
        }

        /* Меню навигации внизу */
        .menu-list {
            margin-top: 25px;
            border-top: 1px solid #1a334d;
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #07131f 0%, #030a12 100%);
            padding: 10px 12px;
            border-bottom: 1px solid #102233;
            text-decoration: none;
            color: #3b9eff;
            font-weight: bold;
        }
        
        .menu-item .arrow { 
            color: #00ffcc; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

    <div class="header">⚔️ ВАРВАРЫ ⚔️</div>

    <div class="content">
        <!-- Ник игрока -->
        <div class="char-name">Злой_комарь</div>

        <!-- Живой аватар из нашего сохранения -->
        <div class="avatar-container">
            <img id="ui-profile-avatar" src="" alt="Аватар" class="avatar-img">
        </div>

        <!-- Флаг под аватаром -->
        <div class="flag-line">🇺🇦</div>

        <!-- Статистика игрока -->
        <div class="stats-list">
            <div class="status-online"><span class="status-dot"></span> Сейчас играет</div>
            <div>🔱 Уровень: <strong id="ui-level">15</strong></div>
            <div>🛡️ Клан: <span>Не состоит в клане</span></div>
            <div>🤝 Братство: <span>Не состоит в братстве</span></div>
            <div>🌿 Слава: <strong id="ui-fame">83 258</strong></div>
            <div>👥 Статус: <span>Лучший друг</span></div>
        </div>
    </div>

    <!-- Кнопки навигации точь-в-точь как на скрине -->
    <div class="menu-list">
        <a href="тренировка.html" class="menu-item">
            <span>🇮🇹 Характеристики</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="index.html" class="menu-item">
            <span>🏠 Главная</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
    </div>

    <script>
        // Подключаем базу данных для вывода живых цифр славы, уровня и аватара
        let defData = { gold: 184491, hp: 172365, level: 15, energy: 3, fame: 83258, nextRegenTime: 0, stats: { strength: 5, defense: 5, agility: 5, mastery: 5, vitality: 5 } };
        let heroData = JSON.parse(localStorage.getItem('barb_save')) || defData;

        // Дефолтная картинка варвара, если игрок еще не покупал аватарку
        const DEFAULT_BARBARIAN = "https://imgur.com";

        function initProfile() {
            // Подгружаем аватар
            document.getElementById('ui-profile-avatar').src = heroData.avatarUrl || DEFAULT_BARBARIAN;
            
            // Подгружаем уровень
            document.getElementById('ui-level').innerText = heroData.level;
            
            // Подгружаем славу с красивым разделением тысяч (83 258)
            if (heroData.fame) {
                document.getElementById('ui-fame').innerText = heroData.fame.toLocaleString('ru-RU');
            }
        }

        initProfile();
    </script>
</body>
</html>
