<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поход Норманнов</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .campaign-title {
            background: linear-gradient(to right, transparent, #004c4c, transparent);
            color: #00ffff;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            padding: 6px;
            font-size: 13px;
            letter-spacing: 1px;
            border-bottom: 1px solid #002b2b;
            margin-bottom: 12px;
        }
        .norman-select {
            background-color: #112233;
            border: 1px solid #1c354d;
            color: #ffffff;
            padding: 6px;
            font-size: 13px;
            width: 150px;
            text-align: center;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .btn-send {
            background: linear-gradient(to bottom, #a03000, #501000);
            border: 1px solid #ff6600;
            box-shadow: inset 0 0 5px rgba(255,100,0,0.5);
            color: #ffffff;
            padding: 8px 35px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            display: inline-block;
            text-decoration: none;
            margin-bottom: 15px;
        }
        .sub-menu-item {
            background: linear-gradient(to bottom, #112233, #0a1520);
            border-top: 1px solid #1c354d;
            border-bottom: 1px solid #050b10;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #c4d6e2;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        .arrow-cyan { color: #00ffcc; font-weight: bold; }
        
        /* Стили для нижнего WAP-меню */
        .norman-footer-divider {
            background-color: #261a0d; height: 4px;
            border-top: 1px solid #4d351c; border-bottom: 1px solid #100b05;
            margin-top: 15px;
        }
        .norman-nav-bar {
            background: linear-gradient(to bottom, #112233, #0a1520);
            border-top: 1px solid #1c354d; border-bottom: 1px solid #050b10;
            padding: 9px 12px; display: flex; justify-content: space-between;
            align-items: center; color: #c4d6e2; text-decoration: none;
            font-family: Arial, sans-serif; font-size: 13px; font-weight: bold;
        }
        .norman-nav-bar:active { background: #162d44; }
        .norman-arrow-cyan { color: #00ffcc; font-weight: bold; font-size: 14px; }
        .norman-footer-text-block {
            text-align: center; padding: 12px; font-size: 11px; color: #6a8296;
            font-family: Arial, sans-serif; background-color: #060b11;
        }
        .norman-footer-text-block span, .norman-footer-text-block a {
            color: #6a8296; text-decoration: none; margin: 0 5px; cursor: pointer;
        }
    </style>
</head>
<body style="background-color: #060b11; margin: 0; padding: 0; color: #fff; font-family: Arial, sans-serif;">

    <!-- Сквозная шапка, генерируемая твоим ядром -->
    <div id="header-container"></div>

    <div class="main-content" style="max-width: 480px; margin: 0 auto; background-color: #080f16; text-align: center; padding-bottom: 10px; min-height: 40vh;">
        
        <div class="campaign-title">Поход</div>

        <!-- Тематическая картинка похода -->
        <div style="margin: 10px 0;">
            <div style="width: 240px; height: 130px; margin: 0 auto; background: #1c354d; border: 1px solid #00ffff; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #00ffff; border-radius: 4px;">
                🐴 [ ВСАДНИК В ПОХОДЕ ]
            </div>
        </div>

        <!-- Динамическая зона похода (Выбор минут или Таймер обратного отсчета) -->
        <div id="campaign-logic-box" style="padding: 10px; font-size: 13px; min-height: 120px;"></div>

        <!-- Промежуточные кнопки локаций -->
        <div style="text-align: left; margin-top: 15px;">
            <div class="sub-menu-item" onclick="location.reload()" style="cursor: pointer;">
                <span>🔄 Обновить</span><span class="arrow-cyan">»</span>
            </div>
            <a href="mine.html" class="sub-menu-item">
                <span>⛏️ Шахта</span><span class="arrow-cyan">»</span>
            </a>
            <a href="village.html" class="sub-menu-item">
                <span>🌿 Участок</span><span class="arrow-cyan">»</span>
            </a>
            <a href="duel.html" class="sub-menu-item">
                <span>👹 Подземелье</span><span class="arrow-cyan">»</span>
            </a>
        </div>
    </div>

    <!-- ФИРМЕННОЕ НИЖНЕЕ МЕНЮ НАВИГАЦИИ -->
    <div class="norman-footer-divider"></div>
    <div id="norman-global-navigation-links">
        <a href="index.html" class="norman-nav-bar">
            <span>🏠 Главная</span><span class="norman-arrow-cyan">»</span>
        </a>
        <a href="hero.html" class="norman-nav-bar">
            <span>🤠 Герой</span><span class="norman-arrow-cyan">»</span>
        </a>
        <a href="mail.html" class="norman-nav-bar">
            <span>✉️ Почта</span><span class="norman-arrow-cyan">»</span>
        </a>
        <a href="chat.html" class="norman-nav-bar">
            <span>💬 Чат</span><span class="norman-arrow-cyan">»</span>
        </a>
        <a href="forum.html" class="norman-nav-bar">
            <span>👥 Форум</span><span class="norman-arrow-cyan">»</span>
        </a>
        <a href="shop.html" class="norman-nav-bar">
            <span>💰 Золото</span><span class="norman-arrow-cyan">»</span>
        </a>
    </div>

    <div class="norman-footer-text-block">
        <span>Об игре</span> | <span>Поддержка</span> | <span>Настройки</span> | <a href="index.html">Выйти</a>
    </div>

    <!-- Подключение сквозного ядра и вынесенного скрипта логики -->
    <script src="global_core.js"></script>
    <script src="campaign_logic.js"></script>
</body>
</html>
