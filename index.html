<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары Онлайн</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>👑 ВАРВАРЫ 👑</h1>
            <p>Пройди путь от раба до конунга</p>
        </div>
        
        <div class="wap-nav">
            <b style="color:#fff;">[ ВХОД В ИГРУ ]</b>
        </div>

        <!-- Теперь пути ведут прямо в корень, без папки php -->
        <form action="login.php" method="POST" class="auth-form">
            <div class="form-group">
                <label>Имя воина:</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Войти во врата</button>
        </form>

        <div class="wap-nav" style="margin-top:15px;">
            <b style="color:#fff;">[ НОВЫЙ ИГРОК ]</b>
        </div>

        <form action="register.php" method="POST" class="auth-form">
            <div class="form-group">
                <label>Имя воина:</label>
                <input type="text" name="username" required placeholder="Злой_комарь">
            </div>
            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" name="password" required placeholder="******">
            </div>
            <div class="form-group">
                <label>Каста (Класс):</label>
                <select name="char_class">
                    <option value="Викинг">🪓 Викинг (+Атака)</option>
                    <option value="Берсерк">🐻 Берсерк (+Крит)</option>
                    <option value="Страж">🛡️ Страж (+Защита)</option>
                </select>
            </div>
            <button type="submit" class="btn-submit" style="background-color:#8b3a16; color:#f4d0a3;">Создать персонажа</button>
        </form>
    </div>
</body>
</html>
