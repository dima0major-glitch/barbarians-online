<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары Онлайн</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #04090e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* Красивое WAP-приветствие над формой */
        .welcome-header {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 360px;
        }
        .game-logo {
            font-size: 26px;
            font-weight: bold;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
            margin-bottom: 5px;
        }
        .game-subtitle {
            font-size: 13px;
            color: #ffd700;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(255, 215, 0, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        /* Твоя форма входа */
        .login-card {
            width: 100%;
            max-width: 360px;
            background: #06121e;
            border: 2px solid #112a40;
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            text-align: center;
            box-sizing: border-box;
        }
        .login-title {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        .login-input {
            width: 100%;
            height: 44px;
            background: #030a12;
            border: 1px solid #153552;
            border-radius: 6px;
            color: #ffffff;
            padding: 0 15px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }
        .login-input:focus {
            border-color: #00ffcc;
        }
        .btn-login {
            width: 100%;
            height: 46px;
            background: linear-gradient(to bottom, #1a5276, #113854);
            border: 1px solid #1f5f8a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 15px;
            transition: background 0.2s;
        }
        .btn-login:active {
            background: #0b2538;
        }
        .login-footer-text {
            font-size: 13px;
            color: #5b758c;
            text-decoration: none;
            display: inline-block;
        }
        .login-footer-text:hover {
            color: #00ffcc;
        }
        .version-label {
            margin-top: auto;
            padding-top: 30px;
            font-size: 12px;
            color: #3b4e5e;
        }
    </style>
</head>
<body>

    <!-- Шапка по красоте -->
    <div class="welcome-header">
        <div class="game-logo">⚔️ Варвары Онлайн ⚔️</div>
        <div class="game-subtitle">Добро пожаловать в мир войны и славы!</div>
    </div>

    <!-- Твоя форма авторизации -->
    <div class="login-card">
        <div class="login-title">Вход в игру</div>
        
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="email" class="login-input" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" class="login-input" placeholder="Пароль" required>
            </div>
            
            <button type="submit" class="btn-login">Войти</button>
        </form>

        <a href="#" class="login-footer-text" onclick="alert('Регистрация воинов временно недоступна в Alpha!')">Нет аккаунта? Создать воина</a>
    </div>

    <div class="version-label">Версия Alpha 0.0.1</div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Чтобы страница не перезагружалась вхолостую
            // Перенаправляем игрока прямиком в главное меню
            window.location.href = 'menu.html';
        }
    </script>
</body>
</html>
