<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Варвары Онлайн</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#08131d;
    color:white;
}

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    background:linear-gradient(to bottom,#08131d,#12354d);
}

.logo{
    font-size:42px;
    color:#FFD700;
    margin-bottom:15px;
    text-align:center;
}

.text{
    font-size:20px;
    color:#ddd;
    margin-bottom:50px;
    text-align:center;
}

button{
    width:280px;
    height:55px;
    margin:10px;
    border:none;
    border-radius:12px;
    background:#154d72;
    color:white;
    font-size:22px;
    font-weight:bold;
}

button:active{
    background:#2677a8;
}

.footer{
    margin-top:60px;
    color:#999;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
⚔️ Варвары Онлайн ⚔️
</div>

<div class="text">
Добро пожаловать в мир войны, славы и великих сражений!
</div>

<button onclick="location.href='login.html'">
Войти
</button>

<button onclick="location.href='register.html'">
Регистрация
</button>

<div class="footer">
Версия Alpha 0.0.1
</div>

</div>

</body>
</html>
