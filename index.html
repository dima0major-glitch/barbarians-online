<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Варвары — Игра</title>
    <style>
        body { background-color: #061118; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; user-select: none; }
        .game-banner { background: linear-gradient(to bottom, #112d3e, #091a26); border-bottom: 2px solid #1c8cd1; padding: 8px; text-align: center; font-size: 16px; font-weight: bold; color: #ffffff; text-shadow: 1px 1px 3px #000; }
        .game-header { background: linear-gradient(to bottom, #091a26, #051017); border-bottom: 2px solid #142a3a; padding: 10px 8px; text-align: center; font-size: 13px; }
        .player-row { display: flex; justify-content: center; align-items: center; gap: 5px; font-weight: bold; color: #e2f2ff; margin-bottom: 6px; }
        .stats-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; font-size: 12px; color: #b0cbdc; }
        .stat-item { display: flex; align-items: center; gap: 3px; }
        .stat-item.gold { color: #ffcc00; }
        .stat-item.hp { color: #ff4d4d; }
        .welcome-block { text-align: center; padding: 12px 5px 6px 5px; }
        .welcome-title { font-size: 18px; font-weight: bold; color: #ffffff; margin-bottom: 4px; }
        .welcome-sub { font-size: 12px; color: #799bb3; }
        .menu-link { background: linear-gradient(to bottom, #091b29, #050e16); padding: 13px 15px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f2231; text-decoration: none; color: #adc8d9; font-size: 14px; font-weight: bold; }
        .menu-link:active { background: #0d273d; }
        .menu-arrow { color: #1c8cd1; font-weight: bold; letter-spacing: -2px; font-size: 15px; }
        .menu-divider { height: 4px; background: repeating-linear-gradient(90deg, #3d240e, #1f1207 20px); border-top: 1px solid #5c3716; border-bottom: 1px solid #5c3716; margin: 6px 0; }
        .footer-links { display: flex; justify-content: center; gap: 15px; padding: 15px 0 10px 0; font-size: 12px; }
        .footer-links a { color: #7ba2bd; text-decoration: none; }
        .legal-info { text-align: center; font-size: 10px; color: #4a6273; padding: 0 15px 25px 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="game-banner">🛡️ Варвары ⚔️</div>
    <div class="game-header">
        <div class="player-row">
            <span>🪓 <span id="player-name">Загрузка...</span></span> 
            <span style="color: #ff9900;">👑 <span id="player-level">1</span></span>
        </div>
        <div class="stats-grid">
            <div class="stat-item hp">❤️ <span id="player-hp">0</span></div>
            <div class="stat-item">🛡️ <span id="player-def">0</span></div>
            <div class="stat-item">🪙 <span id="player-silver">0</span></div>
            <div class="stat-item gold">💰 <span id="player-gold">0</span></div>
            <div class="stat-item" style="color: #00ccff;">💎 <span id="player-gems">0</span></div>
            <div class="stat-item">⚔️ 3/3</div>
        </div>
    </div>

    <div class="welcome-block">
        <div class="welcome-title">Добро пожаловать!</div>
        <div class="welcome-sub">Рядом с тобой <span id="online-count">1080</span> варваров (онлайн)</div>
    </div>

    <div style="margin-top: 5px;">
        <a href="#" class="menu-link"><span>⭐ События</span><span class="menu-arrow">»»</span></a>
        <a href="#" class="menu-link"><span>⚔️ Дуэль</span><span class="menu-arrow">»»</span></a>
        <a href="#" class="menu-link"><span>🏡 Поселок</span><span class="menu-arrow">»»</span></a>
        <div class="menu-divider"></div>
        <a href="/game" class="menu-link"><span>🏠 Главная</span><span class="menu-arrow">»»</span></a>
        <a href="#" class="menu-link"><span>💬 Чат</span><span class="menu-arrow">»»</span></a>
    </div>

    <div class="footer-links">
        <a href="/">Выйти</a>
    </div>
    <div class="legal-info">MISUTECH LIMITED SUITE C, LEVEL 7, WORLD TRUST TOWER, 50 STANLEY STREET, CENTRAL, HONG KONG</div>

    <script>
        async function loadPlayerData() {
            const response = await fetch('/api/user-data');
            const user = await response.json();
            document.getElementById('player-name').innerText = user.username;
            document.getElementById('player-level').innerText = user.level;
            document.getElementById('player-hp').innerText = user.hp;
            document.getElementById('player-def').innerText = user.def;
            document.getElementById('player-silver').innerText = user.silver;
            document.getElementById('player-gold').innerText = user.gold;
            document.getElementById('player-gems').innerText = user.gems;
            document.getElementById('online-count').innerText = user.onlineCount;
        }
        loadPlayerData();
    </script>
</body>
</html>
