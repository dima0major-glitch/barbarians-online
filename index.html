<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары — Браузерная игра</title>
    <style>
        /* Общие настройки стиля в темных тонах */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        /* Шапка сайта */
        header {
            background-color: #0b1116;
            padding: 10px 0;
            border-bottom: 2px solid #3a2212;
            font-weight: bold;
            font-size: 20px;
            color: #4da6ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Контейнер для главного контента */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Промо-картинка (заглушка с фоном) */
        .promo-banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://unsplash.com') center/cover no-repeat;
            border: 1px solid #333;
            box-shadow: inset 0 0 20px #000;
        }

        /* Описание игры */
        .description {
            font-size: 16px;
            line-height: 1.5;
            margin: 25px 10px;
            color: #b0c4de;
        }

        /* Интерактивные формы / кнопки */
        .auth-box {
            background: #11161b;
            border: 1px solid #24333f;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
            color: #ff9933;
            text-transform: uppercase;
        }

        /* Поля ввода */
        input[type="text"], input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 8px 0;
            background-color: #0d1114;
            border: 1px solid #3a4f5e;
            color: #fff;
            border-radius: 3px;
        }

        /* Огненная кнопка в стиле "Начать игру" */
        .btn-action {
            display: inline-block;
            background: linear-gradient(135deg, #8a2be2 0%, #4a0e4e 100%);
            border: 2px solid #ff6600;
            color: #fff;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.5);
            text-shadow: 1px 1px 2px #000;
            margin-top: 10px;
            width: 85%;
        }

        .btn-action:hover {
            background: linear-gradient(135deg, #ff6600 0%, #990000 100%);
            box-shadow: 0 0 15px #ff6600;
        }

        /* Подвал (Футер) */
        footer {
            background-color: #0b1116;
            padding: 15px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #222;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- Шапка игры -->
    <header>
        ⚔️ Варвары ⚔️
    </header>

    <div class="container">
        <!-- Главный баннер -->
        <div class="promo-banner"></div>

        <!-- Текст-завлекалочка -->
        <div class="description">
            Новая историческая игра Варвары!<br>
            Массовые сражения, приключения, общение в реальном времени прямо со страниц браузера!<br>
            Прокачай своего героя так, как хочешь этого ты!
        </div>

        <!-- Блок регистрации -->
        <div class="auth-box">
            <h2>Создать героя</h2>
            <form action="#" method="POST">
                <input type="text" name="reg_username" placeholder="Придумайте имя (Ник)" required><br>
                <input type="password" name="reg_password" placeholder="Пароль" required><br>
                <button type="submit" class="btn-action">Начать новую игру</button>
            </form>
        </div>

        <!-- Блок входа для существующих игроков -->
        <div class="auth-box">
            <h2>Вернуться в бой</h2>
            <form action="#" method="POST">
                <input type="text" name="login_username" placeholder="Имя героя" required><br>
                <input type="password" name="login_password" placeholder="Пароль" required><br>
                <button type="submit" class="btn-action" style="background: linear-gradient(135deg, #2c3e50 0%, #0f171e 100%); border-color: #34495e;">Войти</button>
            </form>
        </div>
    </div>

    <!-- Информация внизу страницы -->
    <footer>
        Об игре<br>
        WARBARIANS GAMES LTD, ALL RIGHTS RESERVED
    </footer>

</body>
</html>
