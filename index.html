<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варвары Онлайн — Текстовая MMORPG</title>
    <style>
        body { background-color: #0d1216; color: #d1d5db; font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 480px; background-color: #06090c; border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; min-height: 100vh; box-sizing: border-box; }
        .header { background: linear-gradient(180deg, #111827 0%, #030712 100%); border-bottom: 2px solid #1f2937; padding: 10px; text-align: center; font-weight: bold; color: #38bdf8; text-transform: uppercase; font-size: 16px; letter-spacing: 1px; }
        .banner { width: 100%; height: auto; display: block; border-bottom: 3px solid #1f2937; max-height: 250px; object-fit: cover; }
        .description-box { padding: 20px; text-align: center; font-size: 14px; line-height: 1.6; color: #9ca3af; }
        .btn-register-container { display: flex; justify-content: center; padding: 15px 0; background: #030712; }
        .btn-fire { background: linear-gradient(180deg, #b45309 0%, #78350f 100%); color: #fef08a; border: 2px solid #ea580c; padding: 12px 40px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px rgba(234,88,12,0.3); text-decoration: none; display: inline-block; text-align: center; }
        .nav-bar { background: linear-gradient(90deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%); border-top: 1px solid #2563eb; border-bottom: 1px solid #2563eb; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #60a5fa; font-weight: bold; font-size: 15px; margin-bottom: -1px; }
        .nav-bar:hover { background: linear-gradient(90deg, #1e293b 0%, #1d4ed8 50%, #1e293b 100%); }
        .form-screen { padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .form-group { width: 100%; max-width: 300px; margin-bottom: 15px; text-align: center; }
        .form-group label { display: block; margin-bottom: 8px; color: #e5e7eb; font-size: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background-color: #374151; border: 1px solid #4b5563; color: #fff; font-size: 16px; box-sizing: border-box; text-align: center; border-radius: 4px; }
        .footer { padding: 20px; text-align: center; font-size: 11px; color: #4b5563; }
        .hidden { display: none !important; }
        .stats-box { padding: 20px; background: #111827; border: 1px solid #1f2937; margin: 15px; border-radius: 6px; }
        .stat-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #374151; }
        .stat-val { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">⚔️ Варвары Онлайн ⚔️</div>

        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="main-screen">
            <img class="banner" src="https://unsplash.com" alt="Варвары">
            <div class="description-box">
                Новая историческая игра Варвары!<br>
                Массовые сражения, приключения, общение в реальном времени прямо со страниц браузера!
            </div>
            <div class="btn-register-container">
                <button type="button" class="btn-fire" onclick="switchScreen('reg-screen')">Начать новую игру</button>
            </div>
            <div class="nav-bar" onclick="switchScreen('auth-screen')">
                <span>🔹 Войти</span>
                <span>»»</span>
            </div>
        </div>

        <!-- ФОРМА ВХОДА -->
        <div id="auth-screen" class="hidden">
            <form class="form-screen" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Введите логин</label>
                    <input type="text" id="login-input" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Введите пароль</label>
                    <input type="password" id="password-input" required>
                </div>
                <button type="submit" class="btn-fire">Войти</button>
            </form>
            <div class="nav-bar" onclick="switchScreen('main-screen')">
                <span>🏡 Главная</span>
                <span>»»</span>
            </div>
        </div>

        <!-- СОЗДАНИЕ ПЕРСОНАЖА -->
        <div id="reg-screen" class="hidden">
            <form class="form-screen" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Имя твоего героя</label>
                    <input type="text" id="reg-username" placeholder="Ник..." required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Пароль для входа</label>
                    <input type="password" id="reg-password" placeholder="Пароль..." required>
                </div>
                <div class="form-group">
                    <label>Выберите класс</label>
                    <select id="reg-class" required>
                        <option value="Воин">⚔️ Воин (+10% Сила)</option>
                        <option value="Разбойник">🗡️ Разбойник (+10% Ловкость)</option>
                        <option value="Шаман">🔮 Шаман (+10% Магия)</option>
                    </select>
                </div>
                <button type="submit" class="btn-fire">Создать героя</button>
            </form>
            <div class="nav-bar" onclick="switchScreen('main-screen')">
                <span>🏡 На главную</span>
                <span>»»</span>
            </div>
        </div>

        <!-- ЭКРАН ХАРАКТЕРИСТИК ПЕРСОНАЖА -->
        <div id="player-screen" class="hidden">
            <div class="stats-box">
                <h3 style="color:#38bdf8; text-align:center; margin-top:0;" id="char-name">Герой</h3>
                <div class="stat-line"><span>Класс:</span> <span class="stat-val" id="char-class">-</span></div>
                <div class="stat-line"><span>Уровень:</span> <span class="stat-val">1</span></div>
                <div class="stat-line"><span>Золото:</span> <span class="stat-val">100 💰</span></div>
            </div>
            <div class="nav-bar" onclick="logout()">
                <span>🚪 Выйти в главное меню</span>
                <span>»»</span>
            </div>
        </div>

        <div class="footer">BARBARIANS ONLINE, 2026</div>
    </div>

    <script>
       // Функция для переключения экранов function switchScreen(id) { document.getElementById('main-screen').classList.add('hidden'); document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('reg-screen').classList.add('hidden'); document.getElementById('player-screen').classList.add('hidden'); document.getElementById(id).classList.remove('hidden'); } // ЭТАП 1: РЕГИСТРАЦИЯ (Сохраняем данные персонажа) function handleRegister(e) { e.preventDefault(); const username = document.getElementById('reg-username').value; const userClass = document.getElementById('reg-class').value; const userPassword = document.getElementById('reg-password').value; // Сохраняем в память браузера (вместо базы данных на первом этапе) localStorage.setItem('barbarians_name', username); localStorage.setItem('barbarians_class', userClass); localStorage.setItem('barbarians_pass', userPassword); // Отправляем на экран персонажа loadCharacterData(username, userClass); } // ЭТАП 1: ВХОД (Проверяем логин и пароль) function handleLogin(e) { e.preventDefault(); const loginInput = document.getElementById('login-input').value; const passInput = document.getElementById('password-input').value; // Достаем сохраненные данные const savedName = localStorage.getItem('barbarians_name'); const savedPass = localStorage.getItem('barbarians_pass'); const savedClass = localStorage.getItem('barbarians_class') || 'Воин'; // Проверяем, совпадают ли они if (loginInput === savedName && passInput === savedPass) { loadCharacterData(savedName, savedClass); } else { alert('Неверный логин или пароль! Или персонаж еще не создан.'); } } // Функция загрузки данных на экран function loadCharacterData(name, className) { document.getElementById('char-name').innerText = name; switchScreen('player-screen'); } // Выход из игры function logout() { switchScreen('main-screen'); } // Автоматическая проверка при старте страницы: если игрок уже входил, сразу пускаем window.onload = function() { const savedName = localStorage.getItem('barbarians_name'); if (savedName) { // Если персонаж есть, подставим его имя в логин для удобства document.getElementById('login-input').value = savedName; } }
    </script>
</body>
</html>
