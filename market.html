<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торговая Площадь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка из сквозного ядра global_core.js -->
    <div id="header-container"></div>

    <div class="main-content" style="padding: 5px; background-color: #2b323a; color: #e0e0e0; font-family: monospace;">
        
        <!-- Заголовок -->
        <div style="background-color: #3a4454; padding: 4px; border-bottom: 2px solid #57687f; font-weight: bold; margin-bottom: 8px;">
            ⚖️ РЫНОК ПОСЕЛКА
        </div>

        <!-- Переключатель вкладок в WAP-стиле -->
        <div style="background: #1e232a; padding: 4px; margin-bottom: 8px; text-align: center; border: 1px solid #3a4454;">
            <span id="tab-buy" onclick="switchMarketTab('buy')" style="color: #ffaa00; font-weight: bold; cursor: pointer; margin: 0 10px;">[ Закупки ]</span> | 
            <span id="tab-sell" onclick="switchMarketTab('sell')" style="color: #8da9c4; cursor: pointer; margin: 0 10px;">[ Продать вещь ]</span>
        </div>

        <!-- Динамический контейнер лотов -->
        <div id="market-view"></div>

        <!-- Навигация назад -->
        <div style="background-color: #1e232a; padding: 5px; margin-top: 10px; border-top: 1px solid #3a4454; text-align: center;">
            <a href="poselok.html" style="color: #8da9c4; text-decoration: none;">↩️ В Поселок</a>
        </div>
    </div>

    <!-- Подключение ядра игры и внешней логики -->
    <script src="global_core.js"></script>
    <script src="market_logic.js"></script>
</body>
</html>
