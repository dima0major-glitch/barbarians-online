<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изменение аватара</title>
    <style>
        body { background: #000b14; color: #fff; font-family: sans-serif; margin: 0; padding: 0; font-size: 14px; }
        .header { background: linear-gradient(180deg, #0d1a26 0%, #050d14 100%); padding: 8px; text-align: center; font-weight: bold; font-size: 16px; color: #00ffcc; border-bottom: 1px solid #1a334d; }
        .content { padding: 15px; text-align: center; }
        .avatar-preview { max-width: 150px; max-height: 200px; border: 2px solid #1a334d; border-radius: 5px; margin-bottom: 20px; background: #030a12; object-fit: contain; }
        .info-text { color: #cbd5e1; font-size: 13px; margin: 8px 0; line-height: 1.4; }
        .file-input-wrapper { margin: 20px 0; }
        .custom-file-input { background: #111e29; color: #fff; border: 1px solid #26405a; padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .price-text { color: #ef4444; font-weight: bold; margin: 15px 0; font-size: 15px; }
        .btn-submit { background: linear-gradient(180deg, #c2410c 0%, #7c2d12 100%); border: 2px solid #ff4500; box-shadow: inset 0 0 10px #ff0000, 0 0 5px #ff4500; color: #fff; font-weight: bold; padding: 10px 30px; font-size: 14px; border-radius: 3px; cursor: pointer; text-shadow: 1px 1px 2px #000; }
        .menu-list { margin-top: 25px; border-top: 1px solid #1a334d; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, #07131f 0%, #030a12 100%); padding: 10px 12px; border-bottom: 1px solid #102233; text-decoration: none; color: #3b9eff; font-weight: bold; }
        .menu-item .arrow { color: #00ffcc; font-family: monospace; }
    </style>
</head>
<body>

    <div class="header">Изменение аватара</div>

    <div class="content">
        <img id="ui-avatar" src="" alt="Аватар" class="avatar-preview">
        <div class="info-text">Аватар должен быть приличным</div>
        <div class="info-text">Максимальная ширина отображения в игре 150px, длина 200px.</div>
        <div class="info-text">Максимальный размер: 1000кб</div>

        <div class="file-input-wrapper">
            <input type="file" id="file-uploader" accept="image/*" class="custom-file-input">
        </div>

        <div class="price-text">Цена изменения: 10 золота</div>
        <button class="btn-submit" onclick="uploadAvatar()">Изменить аватар</button>
    </div>

    <div class="menu-list">
        <a href="hero.html" class="menu-item">
            <span>↩️ Назад</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
        <a href="index.html" class="menu-item">
            <span>🏠 Главная</span>
            <span class="arrow">&gt;&gt;</span>
        </a>
    </div>

    <script>
        let defData = { gold: 184491, hp: 172365, level: 15, energy: 3, fame: 83258, nextRegenTime: 0, stats: { strength: 5, defense: 5, agility: 5, mastery: 5, vitality: 5 } };
        let heroData = JSON.parse(localStorage.getItem('barb_save')) || defData;

        // Ссылка на дефолтного варвара с мечом
        const DEFAULT_BARBARIAN = "https://nocookie.net";

        function save() { localStorage.setItem('barb_save', JSON.stringify(heroData)); }

        function updateUI() {
            if (!heroData.avatarUrl) {
                heroData.avatarUrl = DEFAULT_BARBARIAN;
                save();
            }
            document.getElementById('ui-avatar').src = heroData.avatarUrl;
        }

        window.uploadAvatar = function() {
            let fileInput = document.getElementById('file-uploader');
            if (fileInput.files.length === 0) { alert("Вы не выбрали файл!"); return; }
            if (heroData.fame < 10) { alert("Недостаточно золота! Нужно 10 золота."); return; }

            let file = fileInput.files[0];
            if (file.size > 1000 * 1024) { alert("Файл слишком большой! Максимальный размер 1000кб."); return; }

            let reader = new FileReader();
            reader.onload = function(e) {
                heroData.fame -= 10;
                heroData.avatarUrl = e.target.result;
                save();
                alert("Аватар успешно изменен! Списано 10 золота.");
                updateUI();
            };
            reader.readAsDataURL(file);
        };

        updateUI();
    </script>
</body>
</html>
