<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Варвары — Арена</title>
    <style>
        body { background-color: #061118; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; user-select: none; }
        
        /* Специфичные стили только для контента Арены */
        .category-bar { background: linear-gradient(to bottom, #123524, #05140d); color: #00ffaa; font-size: 14px; font-weight: bold; text-align: center; padding: 6px 15px; border-top: 1px solid #1d5339; border-bottom: 1px solid #040f0a; box-shadow: inset 0 1px 2px rgba(255,255,255,0.1); text-transform: uppercase; letter-spacing: 1px; }
        .arena-banner-container { background-color: #040b0f; padding: 10px; text-align: center; border-bottom: 1px solid #0f2231; }
        .arena-image-placeholder { width: 90%; max-width: 320px; height: 130px; margin: 0 auto; border: 1px solid #1c8cd1; background: linear-gradient(45deg, #112535, #07111a); border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #4b6a82; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .arena-img-icon { font-size: 40px; margin-bottom: 5px; }
        .arena-subtitle { font-size: 13px; color: #adc8d9; margin-top: 10px; font-style: italic; }

        .menu-container { margin-top: 2px; }
        .menu-link { background: linear-gradient(to bottom, #091b29, #050e16); padding: 13px 15px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f2231; text-decoration: none; color: #adc8d9; font-size: 14px; font-weight: bold; }
        .menu-link:active { background: #0d273d; }
        .menu-arrow { color: #1c8cd1; font-weight: bold; letter-spacing: -2px; font-size: 15px; }
        .menu-divider { height: 4px; background: repeating-linear-gradient(90deg, #3d240e, #1f1207 20px); border-top: 1px solid #5c3716; border-bottom: 1px solid #5c3716; margin: 6px 0; }

        /* Стили блокировки кнопок, когда 0/3 боёв */
        .menu-link.disabled-fight { background: linear-gradient(to bottom, #11181e, #090c0f); color: #556b7c; pointer-events: none; border-bottom: 1px solid #161e24; }
        .menu-link.disabled-fight .menu-arrow { color: #3a4b57; }
        .no-battles-alert { background: #260d0d; border: 1px solid #801a1a; color: #ff8080; text-align: center; padding: 8px; font-size: 12px; font-weight: bold; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- Шапка игры сюда вставится автоматически из global_core.js -->

    <div class="category-bar">Арена</div>

    <!-- Красная плашка-оповещение, если у игрока кончились бои -->
    <div id="no-battles-msg" class="no-battles-alert" style="display: none;">🚨 Нет доступных боев! Дождитесь восстановления.</div>

    <div class="arena-banner-container">
        <div class="arena-image-placeholder">
            <span class="arena-img-icon">🏟️</span>
            <span style="font-size: 11px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">Изображение Арены</span>
        </div>
        <div class="arena-subtitle">Покажи, на что ты способен!</div>
    </div>

    <div class="menu-container">
        <!-- Кнопки выбора противников с классом 'fight-btn' для авто-блокировки -->
        <a href="arena_fight.html?type=equal" class="menu-link fight-btn"><span>⚔️ Ровня</span><span class="menu-arrow">»»</span></a>
        <a href="arena_fight.html?type=junior" class="menu-link fight-btn"><span>⚔️🔻 Младшие</span><span class="menu-arrow">»»</span></a>
        <a href="arena_fight.html?type=senior" class="menu-link fight-btn"><span>⚔️🔺 Старшие</span><span class="menu-arrow">»»</span></a>
        <a href="arena_fight.html?type=mercenaries" class="menu-link fight-btn"><span>🪖 Наемники</span><span class="menu-arrow">»»</span></a>
        <a href="arena_fight.html?type=boss" class="menu-link fight-btn"><span>🐲 Владыка Наемников</span><span class="menu-arrow">»»</span></a>
        <a href="arena_fight.html?type=by_level" class="menu-link fight-btn"><span>🏵️ По уровню</span><span class="menu-arrow">»»</span></a>

        <div class="menu-divider"></div>
        <a href="index.html" class="menu-link"><span>🏠 Главная</span><span class="menu-arrow">»»</span></a>
        <a href="hero.html" class="menu-link"><span>🤠 Герой</span><span class="menu-arrow">»»</span></a>
    </div>

    <!-- Подключаем наш единый файл ядра интерфейса и логики времени -->
    <script src="global_core.js"></script>
</body>
</html>
